name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true

      - name: Install make on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install make --no-progress -y
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\ProgramData\chocolatey\bin'

      - name: Configure make shell on Windows
        if: runner.os == 'Windows'
        run: echo "SHELL=bash" >> "$GITHUB_ENV"

      - name: Show tool versions
        run: |
          go version
          make --version

      - name: Check formatting
        run: make fmt

      - name: Verify formatting
        run: git diff --exit-code

      - name: Run golangci-lint action
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m ./...

      - name: Run Makefile lint target
        run: make lint

      - name: Run default tests
        run: make test

      - name: Run e2e tests
        run: make test-e2e

      - name: ShellCheck run.sh
        if: runner.os == 'Linux'
        run: shellcheck scripts/run.sh

      - name: PowerShell run.ps1 parse
        if: runner.os == 'Windows'
        shell: pwsh
        run: $null = [scriptblock]::Create((Get-Content -Raw ./scripts/run.ps1))
